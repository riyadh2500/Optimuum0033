<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" fill="none">
  <rect width="400" height="220" rx="16" fill="#FFF7ED"/>
  <!-- Clock face -->
  <circle cx="130" cy="105" r="60" fill="white" stroke="#EA580C" stroke-width="3"/>
  <circle cx="130" cy="105" r="4" fill="#EA580C"/>
  <!-- Clock hands -->
  <line x1="130" y1="105" x2="130" y2="58" stroke="#EA580C" stroke-width="3" stroke-linecap="round"/>
  <line x1="130" y1="105" x2="165" y2="115" stroke="#1E40AF" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 12-second slot marker -->
  <rect x="126" y="47" width="8" height="6" rx="2" fill="#DC2626"/>
  <!-- Cliff indicator -->
  <text x="130" y="43" text-anchor="middle" font-family="sans-serif" font-size="7" font-weight="700" fill="#DC2626">12s</text>
  <!-- Divider -->
  <line x1="210" y1="40" x2="210" y2="175" stroke="#E5E7EB" stroke-width="1.5" stroke-dasharray="4 3"/>
  <!-- Win/Lose zone -->
  <rect x="220" y="55" width="150" height="50" rx="8" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.5"/>
  <text x="295" y="76" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="700" fill="#15803D">BEFORE DEADLINE</text>
  <text x="295" y="91" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#166534">Full reward ✓</text>
  <rect x="220" y="118" width="150" height="50" rx="8" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.5"/>
  <text x="295" y="139" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="700" fill="#991B1B">AFTER DEADLINE</text>
  <text x="295" y="154" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#991B1B">Worth zero ✗</text>
  <!-- Title -->
  <text x="200" y="205" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#EA580C">Latency Economics</text>
</svg>
