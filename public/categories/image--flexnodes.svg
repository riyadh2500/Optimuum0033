<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" fill="none">
  <rect width="400" height="220" rx="16" fill="#F0FDF4"/>
  <!-- Central validator -->
  <rect x="165" y="85" width="70" height="50" rx="10" fill="#059669"/>
  <text x="200" y="106" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="700" fill="white">VALIDATOR</text>
  <text x="200" y="119" text-anchor="middle" font-family="sans-serif" font-size="7" fill="white" opacity="0.85">receiving</text>
  <!-- Flexnodes around it -->
  <circle cx="60"  cy="50"  r="22" fill="#10B981" opacity="0.9"/>
  <text x="60"  y="47"  text-anchor="middle" font-family="sans-serif" font-size="7" font-weight="700" fill="white">FLEX</text>
  <text x="60"  y="58"  text-anchor="middle" font-family="sans-serif" font-size="7" fill="white" opacity="0.8">NODE 1</text>
  <circle cx="340" cy="50"  r="22" fill="#10B981" opacity="0.9"/>
  <text x="340" y="47"  text-anchor="middle" font-family="sans-serif" font-size="7" font-weight="700" fill="white">FLEX</text>
  <text x="340" y="58"  text-anchor="middle" font-family="sans-serif" font-size="7" fill="white" opacity="0.8">NODE 2</text>
  <circle cx="60"  cy="165" r="22" fill="#34D399" opacity="0.9"/>
  <text x="60"  y="162" text-anchor="middle" font-family="sans-serif" font-size="7" font-weight="700" fill="white">FLEX</text>
  <text x="60"  y="173" text-anchor="middle" font-family="sans-serif" font-size="7" fill="white" opacity="0.8">NODE 3</text>
  <circle cx="340" cy="165" r="22" fill="#34D399" opacity="0.9"/>
  <text x="340" y="162" text-anchor="middle" font-family="sans-serif" font-size="7" font-weight="700" fill="white">FLEX</text>
  <text x="340" y="173" text-anchor="middle" font-family="sans-serif" font-size="7" fill="white" opacity="0.8">NODE 4</text>
  <!-- Equation arrows to validator -->
  <line x1="82" y1="60" x2="165" y2="95" stroke="#10B981" stroke-width="2" stroke-dasharray="5 3" opacity="0.7"/>
  <line x1="318" y1="60" x2="235" y2="95" stroke="#10B981" stroke-width="2" stroke-dasharray="5 3" opacity="0.7"/>
  <line x1="82" y1="155" x2="165" y2="120" stroke="#34D399" stroke-width="2" stroke-dasharray="5 3" opacity="0.7"/>
  <line x1="318" y1="155" x2="235" y2="120" stroke="#34D399" stroke-width="2" stroke-dasharray="5 3" opacity="0.7"/>
  <!-- Equation labels -->
  <text x="118" y="74"  font-family="monospace" font-size="8" fill="#059669" opacity="0.9">Eq₁</text>
  <text x="270" y="74"  font-family="monospace" font-size="8" fill="#059669" opacity="0.9">Eq₂</text>
  <text x="118" y="143" font-family="monospace" font-size="8" fill="#059669" opacity="0.9">Eq₃</text>
  <text x="270" y="143" font-family="monospace" font-size="8" fill="#059669" opacity="0.9">Eq₄</text>
  <!-- MOM token badge -->
  <rect x="155" y="148" width="90" height="18" rx="9" fill="#059669" opacity="0.15" stroke="#059669" stroke-width="1"/>
  <text x="200" y="161" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="700" fill="#065F46">Pays MOM tokens</text>
  <!-- Title -->
  <text x="200" y="205" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#059669">Flexnodes</text>
</svg>
