<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" fill="none">
  <rect width="400" height="220" rx="16" fill="#EEF2FF"/>
  <!-- Left side: Reed-Solomon (static, rigid) -->
  <rect x="20" y="35" width="160" height="155" rx="10" fill="white" stroke="#94A3B8" stroke-width="1.5"/>
  <text x="100" y="56" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="700" fill="#64748B">Reed-Solomon</text>
  <!-- RS node chain - static copies -->
  <circle cx="55"  cy="80"  r="14" fill="#94A3B8"/>
  <text x="55" y="84" text-anchor="middle" font-family="sans-serif" font-size="7" fill="white">SRC</text>
  <line x1="69" y1="80" x2="91" y2="80" stroke="#94A3B8" stroke-width="2"/>
  <circle cx="105" cy="80"  r="14" fill="#94A3B8" opacity="0.7"/>
  <text x="105" y="84" text-anchor="middle" font-family="sans-serif" font-size="6" fill="white">COPY</text>
  <line x1="69" y1="80" x2="75" y2="125" stroke="#94A3B8" stroke-width="2"/>
  <circle cx="80"  cy="140" r="14" fill="#94A3B8" opacity="0.6"/>
  <text x="80" y="144" text-anchor="middle" font-family="sans-serif" font-size="6" fill="white">DUP</text>
  <circle cx="140" cy="140" r="14" fill="#94A3B8" opacity="0.6"/>
  <text x="140" y="144" text-anchor="middle" font-family="sans-serif" font-size="6" fill="white">DUP</text>
  <!-- Slow/bad badge -->
  <rect x="35" y="165" width="120" height="16" rx="8" fill="#FEE2E2"/>
  <text x="95" y="177" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="700" fill="#DC2626">~7s · High Redundancy</text>
  <!-- Right side: RLNC (dynamic recode) -->
  <rect x="220" y="35" width="160" height="155" rx="10" fill="white" stroke="#6366F1" stroke-width="1.5"/>
  <text x="300" y="56" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="700" fill="#4F46E5">RLNC</text>
  <!-- RLNC mesh with recoding -->
  <circle cx="255" cy="80"  r="14" fill="#6366F1"/>
  <text x="255" y="84" text-anchor="middle" font-family="sans-serif" font-size="7" fill="white">SRC</text>
  <line x1="269" y1="80"  x2="291" y2="80"  stroke="#6366F1" stroke-width="2"/>
  <circle cx="305" cy="80"  r="14" fill="#8B5CF6"/>
  <text x="305" y="84" text-anchor="middle" font-family="sans-serif" font-size="6" fill="white">recode</text>
  <line x1="269" y1="80"  x2="275" y2="125" stroke="#6366F1" stroke-width="2"/>
  <circle cx="280"  cy="140" r="14" fill="#A78BFA"/>
  <text x="280" y="144" text-anchor="middle" font-family="sans-serif" font-size="6" fill="white">recode</text>
  <line x1="319" y1="80"  x2="340" y2="125" stroke="#8B5CF6" stroke-width="2"/>
  <circle cx="345" cy="140" r="14" fill="#A78BFA"/>
  <text x="345" y="144" text-anchor="middle" font-family="sans-serif" font-size="6" fill="white">recode</text>
  <!-- Fast badge -->
  <rect x="235" y="165" width="120" height="16" rx="8" fill="#EEF2FF" stroke="#6366F1" stroke-width="1"/>
  <text x="295" y="177" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="700" fill="#4F46E5">171ms · 12x less BW</text>
  <!-- VS divider -->
  <circle cx="200" cy="112" r="14" fill="#1E293B"/>
  <text x="200" y="117" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="900" fill="white">VS</text>
  <!-- Title -->
  <text x="200" y="205" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#6366F1">RLNC vs Reed-Solomon</text>
</svg>
