<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" fill="none">
  <rect width="400" height="220" rx="16" fill="#EEF2FF"/>
  <!-- Network nodes -->
  <circle cx="80"  cy="110" r="22" fill="#6366F1" opacity="0.9"/>
  <circle cx="200" cy="60"  r="22" fill="#8B5CF6" opacity="0.9"/>
  <circle cx="320" cy="110" r="22" fill="#6366F1" opacity="0.9"/>
  <circle cx="200" cy="160" r="22" fill="#A78BFA" opacity="0.9"/>
  <!-- Edges -->
  <line x1="80"  y1="110" x2="200" y2="60"  stroke="#6366F1" stroke-width="3" stroke-dasharray="6 4" opacity="0.6"/>
  <line x1="200" y1="60"  x2="320" y2="110" stroke="#6366F1" stroke-width="3" stroke-dasharray="6 4" opacity="0.6"/>
  <line x1="320" y1="110" x2="200" y2="160" stroke="#6366F1" stroke-width="3" stroke-dasharray="6 4" opacity="0.6"/>
  <line x1="200" y1="160" x2="80"  y2="110" stroke="#6366F1" stroke-width="3" stroke-dasharray="6 4" opacity="0.6"/>
  <line x1="80"  y1="110" x2="320" y2="110" stroke="#8B5CF6" stroke-width="2" stroke-dasharray="4 4" opacity="0.4"/>
  <line x1="200" y1="60"  x2="200" y2="160" stroke="#8B5CF6" stroke-width="2" stroke-dasharray="4 4" opacity="0.4"/>
  <!-- Labels -->
  <text x="200" y="109" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#4338CA">RLNC</text>
  <!-- Title -->
  <text x="200" y="205" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#6366F1">RLNC Fundamentals</text>
</svg>
