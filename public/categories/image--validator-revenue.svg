<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" fill="none">
  <rect width="400" height="220" rx="16" fill="#FFFBEB"/>
  <!-- Bar chart background -->
  <line x1="50" y1="170" x2="370" y2="170" stroke="#D1D5DB" stroke-width="1.5"/>
  <line x1="50" y1="170" x2="50"  y2="40"  stroke="#D1D5DB" stroke-width="1.5"/>
  <!-- Gridlines -->
  <line x1="50" y1="130" x2="370" y2="130" stroke="#E5E7EB" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="50" y1="90"  x2="370" y2="90"  stroke="#E5E7EB" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="50" y1="50"  x2="370" y2="50"  stroke="#E5E7EB" stroke-width="1" stroke-dasharray="4 3"/>
  <!-- Bars: Baseline, +50ms, +100ms, +150ms -->
  <rect x="75"  y="100" width="48" height="70" rx="5" fill="#D1D5DB"/>
  <rect x="155" y="88"  width="48" height="82" rx="5" fill="#FBBF24"/>
  <rect x="235" y="72"  width="48" height="98" rx="5" fill="#F59E0B"/>
  <rect x="315" y="55"  width="48" height="115" rx="5" fill="#D97706"/>
  <!-- Bar labels -->
  <text x="99"  y="96"  text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="700" fill="#6B7280">Base</text>
  <text x="179" y="84"  text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="700" fill="#92400E">+1%</text>
  <text x="259" y="68"  text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="700" fill="#92400E">+1.5%</text>
  <text x="339" y="51"  text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="700" fill="#92400E">+2%</text>
  <!-- X axis labels -->
  <text x="99"  y="184" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#6B7280">Baseline</text>
  <text x="179" y="184" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#6B7280">50ms</text>
  <text x="259" y="184" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#6B7280">100ms</text>
  <text x="339" y="184" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#6B7280">150ms</text>
  <!-- ETH icon -->
  <text x="30" y="110" font-family="sans-serif" font-size="14" fill="#F59E0B" opacity="0.7">Ξ</text>
  <!-- Title -->
  <text x="200" y="205" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#D97706">Validator Revenue</text>
</svg>
