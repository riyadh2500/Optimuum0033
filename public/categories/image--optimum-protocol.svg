<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" fill="none">
  <rect width="400" height="220" rx="16" fill="#F5F3FF"/>
  <!-- Outer ring -->
  <circle cx="200" cy="105" r="72" stroke="#7C3AED" stroke-width="4" opacity="0.25"/>
  <!-- Middle ring -->
  <circle cx="200" cy="105" r="50" stroke="#7C3AED" stroke-width="3" opacity="0.45"/>
  <!-- Inner filled circle -->
  <circle cx="200" cy="105" r="30" fill="url(#optGrad)" />
  <defs>
    <radialGradient id="optGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </radialGradient>
  </defs>
  <!-- "O" letter -->
  <text x="200" y="113" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="900" fill="white">O</text>
  <!-- Orbit dots -->
  <circle cx="200" cy="33"  r="6" fill="#7C3AED" opacity="0.7"/>
  <circle cx="272" cy="105" r="6" fill="#7C3AED" opacity="0.7"/>
  <circle cx="200" cy="177" r="6" fill="#7C3AED" opacity="0.7"/>
  <circle cx="128" cy="105" r="6" fill="#7C3AED" opacity="0.7"/>
  <!-- Title -->
  <text x="200" y="205" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#7C3AED">Optimum Protocol</text>
</svg>
