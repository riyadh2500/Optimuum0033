<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" fill="none">
  <rect width="400" height="220" rx="16" fill="#FFF7ED"/>
  <!-- Chain of blocks -->
  <!-- Block 1 -->
  <rect x="30" y="80" width="80" height="55" rx="8" fill="#F97316" opacity="0.9"/>
  <text x="70" y="105" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="700" fill="white">#001</text>
  <text x="70" y="120" text-anchor="middle" font-family="sans-serif" font-size="8" fill="white" opacity="0.8">Genesis</text>
  <!-- Link -->
  <rect x="110" y="104" width="30" height="6" rx="3" fill="#EA580C" opacity="0.6"/>
  <!-- Block 2 -->
  <rect x="140" y="80" width="80" height="55" rx="8" fill="#F97316" opacity="0.85"/>
  <text x="180" y="105" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="700" fill="white">#002</text>
  <text x="180" y="120" text-anchor="middle" font-family="sans-serif" font-size="8" fill="white" opacity="0.8">Block</text>
  <!-- Link -->
  <rect x="220" y="104" width="30" height="6" rx="3" fill="#EA580C" opacity="0.6"/>
  <!-- Block 3 -->
  <rect x="250" y="80" width="80" height="55" rx="8" fill="#F97316" opacity="0.8"/>
  <text x="290" y="105" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="700" fill="white">#003</text>
  <text x="290" y="120" text-anchor="middle" font-family="sans-serif" font-size="8" fill="white" opacity="0.8">Block</text>
  <!-- Pending block (dashed) -->
  <rect x="360" y="80" width="25" height="55" rx="8" fill="none" stroke="#F97316" stroke-width="2" stroke-dasharray="5 3" opacity="0.6"/>
  <rect x="330" y="104" width="30" height="6" rx="3" fill="#EA580C" opacity="0.4"/>
  <!-- Title -->
  <text x="200" y="205" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#EA580C">Blockchain Fundamentals</text>
</svg>
