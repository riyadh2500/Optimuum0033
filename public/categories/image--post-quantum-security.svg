<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" fill="none">
  <rect width="400" height="220" rx="16" fill="#FDF4FF"/>
  <!-- Quantum symbol (atom-like) -->
  <ellipse cx="140" cy="105" rx="50" ry="22" stroke="#A21CAF" stroke-width="2" fill="none" opacity="0.7"/>
  <ellipse cx="140" cy="105" rx="50" ry="22" stroke="#A21CAF" stroke-width="2" fill="none" opacity="0.7" transform="rotate(60 140 105)"/>
  <ellipse cx="140" cy="105" rx="50" ry="22" stroke="#A21CAF" stroke-width="2" fill="none" opacity="0.7" transform="rotate(120 140 105)"/>
  <circle cx="140" cy="105" r="10" fill="#A21CAF" opacity="0.9"/>
  <text x="140" y="109" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="700" fill="white">Q</text>
  <!-- Shield blocking quantum -->
  <path d="M245 60 L305 80 L305 125 Q305 155 275 168 Q245 155 245 125 Z" fill="url(#pqGrad)" opacity="0.92"/>
  <defs>
    <linearGradient id="pqGrad" x1="245" y1="60" x2="305" y2="168" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#DB2777"/>
      <stop offset="100%" stop-color="#9D174D"/>
    </linearGradient>
  </defs>
  <!-- Lock on shield -->
  <rect x="263" y="105" width="24" height="18" rx="4" fill="white" opacity="0.9"/>
  <path d="M268 105 Q268 95 275 95 Q282 95 282 105" stroke="white" stroke-width="3" fill="none" opacity="0.9"/>
  <circle cx="275" cy="114" r="3" fill="#9D174D"/>
  <!-- Blocked arrow -->
  <line x1="200" y1="105" x2="240" y2="105" stroke="#A21CAF" stroke-width="3" opacity="0.6" marker-end="url(#qarr)"/>
  <defs>
    <marker id="qarr" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#A21CAF" opacity="0.6"/>
    </marker>
  </defs>
  <line x1="241" y1="95" x2="254" y2="115" stroke="#DC2626" stroke-width="3" stroke-linecap="round"/>
  <line x1="254" y1="95" x2="241" y2="115" stroke="#DC2626" stroke-width="3" stroke-linecap="round"/>
  <!-- Equation hint -->
  <text x="65" y="168" font-family="monospace" font-size="9" fill="#A21CAF" opacity="0.8">3x+2y+z = ?</text>
  <text x="65" y="181" font-family="monospace" font-size="9" fill="#A21CAF" opacity="0.6">7x+y+11z = ?</text>
  <!-- Title -->
  <text x="200" y="205" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#A21CAF">Post-Quantum Security</text>
</svg>
