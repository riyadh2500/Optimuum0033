<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" fill="none">
  <rect width="400" height="220" rx="16" fill="#F5F3FF"/>
  <!-- AI brain shape -->
  <ellipse cx="130" cy="100" rx="55" ry="48" fill="url(#aiGrad)" opacity="0.9"/>
  <defs>
    <radialGradient id="aiGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </radialGradient>
  </defs>
  <!-- Brain circuit lines -->
  <line x1="105" y1="80"  x2="155" y2="80"  stroke="white" stroke-width="1.5" opacity="0.6"/>
  <line x1="95"  y1="100" x2="165" y2="100" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <line x1="105" y1="120" x2="155" y2="120" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <line x1="130" y1="60"  x2="130" y2="140" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <circle cx="105" cy="80"  r="4" fill="white" opacity="0.9"/>
  <circle cx="155" cy="80"  r="4" fill="white" opacity="0.9"/>
  <circle cx="95"  cy="100" r="4" fill="white" opacity="0.9"/>
  <circle cx="165" cy="100" r="4" fill="white" opacity="0.9"/>
  <circle cx="105" cy="120" r="4" fill="white" opacity="0.9"/>
  <circle cx="155" cy="120" r="4" fill="white" opacity="0.9"/>
  <text x="130" y="104" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="900" fill="white">AI</text>
  <!-- Arrow from AI to blockchain -->
  <path d="M 188 100 Q 230 70 270 90" stroke="#7C3AED" stroke-width="2.5" fill="none" marker-end="url(#aiarr)"/>
  <defs>
    <marker id="aiarr" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7C3AED"/>
    </marker>
  </defs>
  <!-- Blockchain node group -->
  <rect x="268" y="68" width="100" height="65" rx="10" fill="white" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="318" y="88"  text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="700" fill="#5B21B6">Intent</text>
  <text x="318" y="101" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#7C3AED">→ Solver</text>
  <text x="318" y="114" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#7C3AED">→ Settlement</text>
  <text x="318" y="127" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#7C3AED">→ On-chain ✓</text>
  <!-- Label on arrow -->
  <text x="228" y="66" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="700" fill="#7C3AED">objective</text>
  <!-- Optimum badge -->
  <rect x="60" y="157" width="140" height="18" rx="9" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1"/>
  <text x="130" y="170" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="700" fill="#5B21B6">Powered by Flexnodes</text>
  <!-- Title -->
  <text x="200" y="205" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#7C3AED">AI Agents &amp; Web3</text>
</svg>
