<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" fill="none">
  <rect width="400" height="220" rx="16" fill="#F5F3FF"/>
  <!-- Gear/cog outer -->
  <circle cx="200" cy="105" r="55" stroke="#7C3AED" stroke-width="3" opacity="0.2" fill="#EDE9FE" opacity="0.4"/>
  <!-- Gear teeth (simple rectangles around circle) -->
  <rect x="193" y="42" width="14" height="16" rx="3" fill="#7C3AED" opacity="0.5"/>
  <rect x="193" y="151" width="14" height="16" rx="3" fill="#7C3AED" opacity="0.5"/>
  <rect x="137" y="98" width="16" height="14" rx="3" fill="#7C3AED" opacity="0.5"/>
  <rect x="247" y="98" width="16" height="14" rx="3" fill="#7C3AED" opacity="0.5"/>
  <!-- Diagonal teeth -->
  <rect x="151" y="57" width="14" height="16" rx="3" fill="#7C3AED" opacity="0.4" transform="rotate(-45 158 65)"/>
  <rect x="230" y="57" width="14" height="16" rx="3" fill="#7C3AED" opacity="0.4" transform="rotate(45 237 65)"/>
  <rect x="151" y="133" width="14" height="16" rx="3" fill="#7C3AED" opacity="0.4" transform="rotate(45 158 141)"/>
  <rect x="230" y="133" width="14" height="16" rx="3" fill="#7C3AED" opacity="0.4" transform="rotate(-45 237 141)"/>
  <!-- Inner circle -->
  <circle cx="200" cy="105" r="38" fill="url(#gearGrad)"/>
  <defs>
    <radialGradient id="gearGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#5B21B6"/>
    </radialGradient>
  </defs>
  <!-- Inner cutout -->
  <circle cx="200" cy="105" r="14" fill="white" opacity="0.25"/>
  <!-- "HOW" text -->
  <text x="200" y="101" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="900" fill="white">HOW</text>
  <text x="200" y="114" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="900" fill="white">IT WORKS</text>
  <!-- Title -->
  <text x="200" y="205" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#7C3AED">How Optimum Works</text>
</svg>
