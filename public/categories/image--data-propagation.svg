<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" fill="none">
  <rect width="400" height="220" rx="16" fill="#EFF6FF"/>
  <!-- Source node -->
  <circle cx="60" cy="110" r="24" fill="#2563EB" opacity="0.9"/>
  <text x="60" y="115" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="700" fill="white">SRC</text>
  <!-- Ripple waves emanating from source -->
  <circle cx="60" cy="110" r="40" stroke="#3B82F6" stroke-width="1.5" opacity="0.5" fill="none"/>
  <circle cx="60" cy="110" r="58" stroke="#3B82F6" stroke-width="1" opacity="0.3" fill="none"/>
  <!-- Destination nodes -->
  <circle cx="220" cy="60"  r="18" fill="#1D4ED8" opacity="0.85"/>
  <circle cx="310" cy="110" r="18" fill="#1D4ED8" opacity="0.85"/>
  <circle cx="220" cy="160" r="18" fill="#1D4ED8" opacity="0.85"/>
  <!-- Packet arrows -->
  <line x1="84"  y1="100" x2="202" y2="68"  stroke="#2563EB" stroke-width="2.5" opacity="0.7" marker-end="url(#arr)"/>
  <line x1="84"  y1="110" x2="292" y2="110" stroke="#2563EB" stroke-width="2.5" opacity="0.7" marker-end="url(#arr)"/>
  <line x1="84"  y1="120" x2="202" y2="152" stroke="#2563EB" stroke-width="2.5" opacity="0.7" marker-end="url(#arr)"/>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2563EB" opacity="0.8"/>
    </marker>
  </defs>
  <!-- Destination labels -->
  <text x="220" y="64"  text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="700" fill="white">NODE</text>
  <text x="310" y="114" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="700" fill="white">NODE</text>
  <text x="220" y="164" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="700" fill="white">NODE</text>
  <!-- Title -->
  <text x="200" y="205" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#2563EB">Data Propagation</text>
</svg>
