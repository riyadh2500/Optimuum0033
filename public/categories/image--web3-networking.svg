<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" fill="none">
  <rect width="400" height="220" rx="16" fill="#F0FDF4"/>
  <!-- Mesh nodes -->
  <circle cx="60"  cy="70"  r="14" fill="#10B981" opacity="0.85"/>
  <circle cx="160" cy="50"  r="14" fill="#059669" opacity="0.85"/>
  <circle cx="260" cy="70"  r="14" fill="#10B981" opacity="0.85"/>
  <circle cx="340" cy="110" r="14" fill="#059669" opacity="0.85"/>
  <circle cx="260" cy="155" r="14" fill="#10B981" opacity="0.85"/>
  <circle cx="160" cy="165" r="14" fill="#059669" opacity="0.85"/>
  <circle cx="60"  cy="150" r="14" fill="#10B981" opacity="0.85"/>
  <circle cx="200" cy="110" r="18" fill="#047857" opacity="0.9"/>
  <!-- Connections -->
  <line x1="60"  y1="70"  x2="160" y2="50"  stroke="#10B981" stroke-width="2" opacity="0.5"/>
  <line x1="160" y1="50"  x2="260" y2="70"  stroke="#10B981" stroke-width="2" opacity="0.5"/>
  <line x1="260" y1="70"  x2="340" y2="110" stroke="#10B981" stroke-width="2" opacity="0.5"/>
  <line x1="340" y1="110" x2="260" y2="155" stroke="#10B981" stroke-width="2" opacity="0.5"/>
  <line x1="260" y1="155" x2="160" y2="165" stroke="#10B981" stroke-width="2" opacity="0.5"/>
  <line x1="160" y1="165" x2="60"  y2="150" stroke="#10B981" stroke-width="2" opacity="0.5"/>
  <line x1="60"  y1="150" x2="60"  y2="70"  stroke="#10B981" stroke-width="2" opacity="0.5"/>
  <!-- Hub connections -->
  <line x1="200" y1="110" x2="60"  y2="70"  stroke="#047857" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.5"/>
  <line x1="200" y1="110" x2="260" y2="70"  stroke="#047857" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.5"/>
  <line x1="200" y1="110" x2="340" y2="110" stroke="#047857" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.5"/>
  <line x1="200" y1="110" x2="160" y2="165" stroke="#047857" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.5"/>
  <!-- Center label -->
  <text x="200" y="115" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="700" fill="white">P2P</text>
  <!-- Title -->
  <text x="200" y="205" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#059669">Web3 Networking</text>
</svg>
