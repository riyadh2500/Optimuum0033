<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 140" fill="none">
  <defs>
    <!-- Main silver gradient -->
    <radialGradient id="g1" cx="35%" cy="35%" r="65%">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="25%"  stop-color="#F0F2F5"/>
      <stop offset="55%"  stop-color="#C8CDD8"/>
      <stop offset="80%"  stop-color="#A0A8B8"/>
      <stop offset="100%" stop-color="#8890A0"/>
    </radialGradient>
    <!-- Highlight gradient -->
    <radialGradient id="g2" cx="30%" cy="28%" r="55%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="60%"  stop-color="#FFFFFF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <!-- Shadow -->
    <radialGradient id="g3" cx="50%" cy="90%" r="50%">
      <stop offset="0%"   stop-color="#00000022"/>
      <stop offset="100%" stop-color="#00000000"/>
    </radialGradient>
    <filter id="blur-shadow">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="soft">
      <feGaussianBlur stdDeviation="0.8"/>
    </filter>
  </defs>

  <!-- Drop shadow -->
  <ellipse cx="140" cy="128" rx="100" ry="10" fill="#00000018" filter="url(#blur-shadow)"/>

  <!-- Main blob: two spheres merged — left lobe -->
  <path d="
    M 70,20
    C 35,20  15,42  15,70
    C 15,98  35,120  70,120
    C 92,120  110,108  122,92
    C 134,108  152,120  175,120
    C 210,120  265,98  265,70
    C 265,42  245,20  210,20
    C 188,20  170,32  158,48
    C 146,32  128,20  105,20
    Z
  " fill="url(#g1)"/>

  <!-- Specular highlight top-left -->
  <path d="
    M 72,28
    C 45,28  28,46  28,68
    C 28,50  44,32  70,30
    C 90,28  106,38  118,52
    C 130,38  148,28  170,28
    C 192,28  210,38  222,52
    C 208,36  190,24  172,24
    C 150,24  134,36  140,48
    C 128,34  112,24  92,24
    Z
  " fill="url(#g2)"/>

  <!-- Small secondary highlight right lobe -->
  <ellipse cx="200" cy="48" rx="28" ry="14" fill="white" opacity="0.35" transform="rotate(-20 200 48)"/>

  <!-- Small secondary highlight left lobe -->
  <ellipse cx="82" cy="50" rx="22" ry="11" fill="white" opacity="0.30" transform="rotate(-15 82 50)"/>
</svg>
